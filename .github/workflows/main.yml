name: Build & Release

on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  unit_tests:
    if: "github.event_name != 'push' || !contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run unit tests
        env:
          # Runtime .env/.secrets are intentionally untracked. Use the checked-in,
          # non-secret defaults so collection cannot depend on files from a developer host.
          APP_ENV_PATH: .env.example
          APP_SECRETS_PATH: /dev/null
        run: |
          export DEV=1
          pytest -q

  build_and_push:
    if: "github.event_name != 'push' || !contains(github.event.head_commit.message, 'skip ci')"
    needs: unit_tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: '0'

      - name: Generate container version tag
        id: calver
        run: |
          echo "tag=$(TZ='Europe/Amsterdam' date +%Y.%m.%d.%H)" >> $GITHUB_OUTPUT
          echo "repo=$(echo ${{ github.repository }} | tr [:upper:] [:lower:])" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Multiplatform docker build and push
        uses: docker/build-push-action@v7
        with:
          file: cerbomoticzGx.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.calver.outputs.repo }}:${{ steps.calver.outputs.tag }}
            ghcr.io/${{ steps.calver.outputs.repo }}:latest
          cache-from: type=registry,ref=ghcr.io/${{ steps.calver.outputs.repo }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.calver.outputs.repo }}:buildcache,mode=max

      - name: Generate release tag
        id: tagger
        shell: bash
        run: |
          month="$(TZ='Europe/Amsterdam' date +%Y.%m)"
          escaped_month="${month//./\\.}"
          latest="$(
            git tag -l "v${month}.*" \
              | sed -n "s/^v${escaped_month}\.\([0-9][0-9]*\)$/\1/p" \
              | sort -n \
              | tail -1
          )"
          next="$(( ${latest:-0} + 1 ))"
          printf -v next_padded "%02d" "$next"
          echo "next_release_tag=v${month}.${next_padded}" >> "$GITHUB_OUTPUT"

      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.tagger.outputs.next_release_tag }}
          git push origin refs/tags/${{ steps.tagger.outputs.next_release_tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tagger.outputs.next_release_tag }}
          name: Release ${{ steps.tagger.outputs.next_release_tag || 'draft' }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
