<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cerbomoticzGx · ESS Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>
<body>
  <header class="topbar">
    <div class="brand">cerbomoticzGx<span> · ESS</span></div>
    <div id="status-strip" class="status-strip">
      <span class="muted">loading…</span>
    </div>
    <div id="header-clock" class="header-clock"></div>
  </header>

  <section class="overview">
    <div id="metrics" class="metrics"></div>
    <div class="overview-row">
      <div id="solar" class="card solar"></div>
      <div id="decision" class="card decision"></div>
    </div>
    <!-- Day cost summary lives here (above the tabs) so it's visible on every tab. -->
    <div id="day-summary" class="card"></div>
  </section>

  <nav class="tabs">
    <button class="tab" data-tab="live">Live</button>
    <button class="tab" data-tab="trends">Trends</button>
    <button class="tab active" data-tab="schedule">Schedule</button>
    <button class="tab" data-tab="config">Configuration</button>
  </nav>

  <main>
    <section id="tab-live" class="tab-panel">
      <div class="card">
        <h3 style="margin:2px 0 10px">Live power flow</h3>
        <div id="powerflow" class="powerflow"><span class="muted">waiting for live feed…</span></div>
      </div>
    </section>

    <section id="tab-trends" class="tab-panel">
      <div id="energy-metrics" class="metrics-grid"></div>
      <div class="card">
        <h3 style="margin:2px 0 10px">SoC &amp; price across the horizon</h3>
        <div id="horizon-chart" class="chart"><span class="muted">no plan yet…</span></div>
      </div>
    </section>

    <section id="tab-schedule" class="tab-panel active">
      <div class="legend">
        <span class="chip mode-idle">IDLE</span>
        <span class="chip mode-retain">RETAIN</span>
        <span class="chip mode-buy">BUY</span>
        <span class="chip mode-sell">SELL</span>
        <span class="muted">— click an hour to expand to 15-min, click a slot for the reason</span>
      </div>

      <div class="card">
        <div class="table-head hour-row">
          <span class="col-time">Hour</span>
          <span class="col-bar">Timeline</span>
          <span class="col-num">Avg €/kWh</span>
          <span class="col-num">Import</span>
          <span class="col-num">Export</span>
          <span class="col-num">SoC</span>
          <span class="col-num">Net</span>
        </div>
        <div id="hours"></div>
      </div>
    </section>

    <section id="tab-config" class="tab-panel">
      <div id="config"></div>
    </section>
  </main>

  <footer class="foot">
    <span id="meta" class="muted"></span>
    <button id="refresh" class="btn">Refresh</button>
  </footer>

  <!-- Self-contained, dependency-free view modules. Loaded before app.js, which
       calls them defensively (try/catch) so a failure here can't break the rest. -->
  <script src="{{ url_for('static', filename='js/powerflow.js') }}"></script>
  <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
