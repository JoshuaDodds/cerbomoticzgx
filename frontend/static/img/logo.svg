  <!-- roof solar panel -->
  <g stroke="url(#cgx)" stroke-width="2.5" fill="none" stroke-linejoin="round">
    <path d="M430,58 L470,40 L486,49 L446,67 Z"/>
    <line x1="438.5" y1="62" x2="478" y2="44"/>
    <line x1="451" y1="52.5" x2="463" y2="58"/>
  </g>

  <!-- GX -->
  <text x="430" y="112" font-family="'Segoe UI', system-ui, Roboto, Helvetica, Arial, sans-serif"
        font-size="98" font-weight="800" letter-spacing="-2" fill="url(#cgx)">GX</text>
