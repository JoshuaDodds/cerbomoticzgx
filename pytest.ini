[pytest]
filterwarnings =
    # graphql_subscription_manager 0.7.1 still imports setuptools' deprecated
    # pkg_resources API. Setuptools emits this as UserWarning on Python 3.11 and
    # DeprecationWarning on Python 3.12, so match their shared Warning base class.
    # The message and module constraints keep unrelated warnings visible.
    ignore:pkg_resources is deprecated as an API.*:Warning:graphql_subscription_manager
    ignore:Deprecated call to `pkg_resources\.declare_namespace\('zope'\)`.*:DeprecationWarning:pkg_resources
    # python-dateutil 2.8.x uses utcfromtimestamp during module initialisation on
    # Python 3.12. This is dependency code, not a deprecated call in this project.
    ignore:datetime\.datetime\.utcfromtimestamp\(\) is deprecated.*:DeprecationWarning:dateutil\.tz\.tz
